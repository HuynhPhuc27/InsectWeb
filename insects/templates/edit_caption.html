{% extends "template_v2.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm rounded">
                <div class ="card rounded">

                    
                    <div class="card-body text-center">
                        <h4 class="card-title mb-4">Edit image's caption</h4>
                        
                        <div class="mb-4 d-flex justify-content-center bg-light p-3 rounded">
                            <img src="{{ MEDIA_URL }}processed_images_102_split/{{ image.image_path }}" 
                                style="max-height: 450px; object-fit: contain;" 
                                class="img-fluid shadow-sm" alt="Edit Target">
                        </div>

                        <form method="POST" action="">
                            {% csrf_token %}
                            <div class="form-group text-start mb-3">
                                <label class="fw-bold mb-2">Present Caption:</label>
                                <textarea name="caption" class="form-control" rows="8" required>{{ image.caption }}</textarea>
                            </div>
                            
                            <div class="d-flex justify-content-center gap-3">
                                <a href="{% url 'data_classification' %}" class="btn btn-outline-secondary px-4">Back to</a>
                                <button type="submit" class="btn btn-primary px-5">Update currently</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
