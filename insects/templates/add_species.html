{% extends "template_v2.html" %}
{% block content %}

<div class="container py-3 d-flex justify-content-center">
    <div style="max-width: 600px; width: 100%;">
        <div class="d-flex justify-content-center">
            <p class="fw-bold fs-2">Add Species</p>
        </div>
        <div>
            <hr>
        </div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Scientific Name</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="ename" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Common Name</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="name" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Species Name</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="speciesName" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">English Name</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="engName" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Vietnamese Name</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="viName" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Morphology</label>
                <div class="col-md-9">
                    <textarea type="text" class="form-control" name="morphologicFeature" required></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Distribution</label>
                <div class="col-md-9">
                    <textarea type="text" class="form-control" name="distribution" required></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Biological Characteristics</label>
                <div class="col-md-9">
                    <textarea type="text" class="form-control" name="characteristic" required></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Behavior</label>
                <div class="col-md-9">
                    <textarea type="text" class="form-control" name="behavior" required></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Control Methods</label>
                <div class="col-md-9">
                    <textarea type="text" class="form-control" name="protectionMethod" required></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Genus</label>
                <div class="col-md-9">
                    <select class="form-select" id="genus" name="genus">
                        {% for ge in genus %}
                            <option value="{{ ge.genus_id }}">{{ ge.ename }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Thumbnail</label>
                <div class="col-md-9">
                    <input type="file" class="form-control" name="thumbnail" required>
                </div>
            </div>
            <div class="d-flex justify-content-end">
                <a href="{% url 'manage_insect' %}" class="btn btn-secondary me-2">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Species</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Thông báo -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="successModalLabel">Notification</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="closeModalBtn">OK</button>
            </div>
        </div>
    </div>
</div>

{% if messages %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var successModal = new bootstrap.Modal(document.getElementById('successModal'));
        successModal.show();

        document.getElementById("closeModalBtn").addEventListener("click", function() {
            {% if messages %}
                {% for message in messages %}
                    {% if "success" in message.tags %}
                        window.location.href = "{% url 'manage_insect' %}";
                    {% endif %}
                {% endfor %}
            {% endif %}
        });
    });
</script>
{% endif %}

{% endblock %}
