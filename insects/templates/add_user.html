{% extends "template_v2.html" %}
{% block content %}

<div class="container py-3 d-flex justify-content-center">
    <div style="max-width: 600px; width: 100%;">
        <div class="d-flex justify-content-center">
            <p class="fw-bold fs-2">Add User</p>
        </div>
        <div>
            <hr>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Username</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="username" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Last Name</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="last_name" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">First Name</label>
                <div class="col-md-9">
                    <input type="text" class="form-control" name="first_name" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Email</label>
                <div class="col-md-9">
                    <input type="email" class="form-control" name="email" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Password</label>
                <div class="col-md-9">
                    <input type="password" class="form-control" name="password" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-md-3 col-form-label fw-bold">Role</label>
                <div class="col-md-9">
                    {% for group in groups %}
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="user_group" id="group{{ group.id }}" value="{{ group.name }}">
                        <label class="form-check-label" for="group{{ group.id }}">{{ group.name }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="d-flex justify-content-end">
                <a href="{% url 'manage_user' %}" class="btn btn-secondary me-2">Cancel</a>
                <button type="submit" class="btn btn-primary">Add User</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Thông báo -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="successModalLabel">Notification</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="closeModalBtn">OK</button>
            </div>
        </div>
    </div>
</div>


{% if messages %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var successModal = new bootstrap.Modal(document.getElementById('successModal'));
        successModal.show();

        document.getElementById("closeModalBtn").addEventListener("click", function() {
            {% if messages %}
                {% for message in messages %}
                    {% if "success" in message.tags %}
                        window.location.href = "{% url 'manage_user' %}";
                    {% endif %}
                {% endfor %}
            {% endif %}
        });
    });
</script>
{% endif %}

{% endblock %}
